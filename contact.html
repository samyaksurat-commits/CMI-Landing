<body>
    <section class="form-container">
        <h2>Start Your Journey</h2>
        <p>Fill out the form below and our counselor will reach out to you.</p>
        
        <form action="#" method="POST">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter your name">

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">

            <label for="course">Interested Course</label>
            <select id="course" name="course">
                <option value="web-dev">Web Development</option>
                <option value="uiux">UI/UX Design</option>
                <option value="oracle">Oracle APEX</option>
            </select>

            <button type="submit" class="cta-main">Submit Details</button>
        </form>
